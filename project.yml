name: VolumeMixer
options:
  bundleIdPrefix: com.volumemixer
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.4"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    # Local/personal use: ad-hoc "Sign to Run Locally". Open in Xcode and pick
    # your team for a stable signature (keeps the audio-capture permission grant).
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
targets:
  VolumeMixer:
    type: application
    platform: macOS
    deploymentTarget: "14.4"
    sources:
      - path: Sources
      # Bundled MediaRemote adapter (framework + Perl script), copied verbatim into
      # Contents/Resources/MediaRemoteAdapter/. Run by /usr/bin/perl at runtime — not
      # linked — so it lives as a resource, not an embedded framework.
      - path: Vendor/MediaRemoteAdapter
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: VolumeMixer
        PRODUCT_BUNDLE_IDENTIFIER: com.volumemixer.app
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: VolumeMixer.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
